<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="welcome" class="container">
    <h1>Welcome to the Adventure Quiz</h1>
    <p>Discover your adventure personality!</p>
    <button onclick="startQuiz()">Start</button>
  </div>

  <div id="quiz" class="container hidden">
    <h2 id="questionText"></h2>
    <div class="options">
      <button onclick="selectAnswer('agree')">Agree</button>
      <button onclick="selectAnswer('neutral')">Neutral</button>
      <button onclick="selectAnswer('disagree')">Disagree</button>
    </div>
  </div>

 
  <div id="result" class="container hidden">
    <h2>Your Adventure Personality</h2>
    <div id="resultText" class="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
